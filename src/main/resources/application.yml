server:
  port: ${PORT:3003}
  address: 0.0.0.0

spring:
  application:
    name: status-mvp-price-backend
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}

app:
  cache:
    priceTtlSeconds: ${PRICE_CACHE_TTL_SECONDS:120}
    requestTtlSeconds: ${REQUEST_CACHE_TTL_SECONDS:30}
  marketHistory:
    bucketMinutes: ${MARKET_HISTORY_BUCKET_MINUTES:30}
    searchWindowBuckets: ${MARKET_HISTORY_SEARCH_WINDOW_BUCKETS:4}
    sampleTtlSeconds: ${MARKET_HISTORY_SAMPLE_TTL_SECONDS:259200}
  safe:
    notifications:
      enabled: ${SAFE_NOTIFICATIONS_ENABLED:true}
      pollDelayMs: ${SAFE_NOTIFICATIONS_POLL_DELAY_MS:45000}
      inboxLimit: ${SAFE_NOTIFICATIONS_INBOX_LIMIT:50}
      pullDefaultLimit: ${SAFE_NOTIFICATIONS_PULL_DEFAULT_LIMIT:20}
      queueTtlSeconds: ${SAFE_NOTIFICATIONS_QUEUE_TTL_SECONDS:1209600}
      remote:
        fcm:
          enabled: ${APP_SAFE_NOTIFICATIONS_REMOTE_FCM_ENABLED:false}
          projectId: ${APP_SAFE_NOTIFICATIONS_REMOTE_FCM_PROJECT_ID:}
          clientEmail: ${APP_SAFE_NOTIFICATIONS_REMOTE_FCM_CLIENT_EMAIL:}
          privateKeyPem: ${APP_SAFE_NOTIFICATIONS_REMOTE_FCM_PRIVATE_KEY_PEM:}
        apns:
          enabled: ${APP_SAFE_NOTIFICATIONS_REMOTE_APNS_ENABLED:false}
          teamId: ${APP_SAFE_NOTIFICATIONS_REMOTE_APNS_TEAM_ID:}
          keyId: ${APP_SAFE_NOTIFICATIONS_REMOTE_APNS_KEY_ID:}
          bundleId: ${APP_SAFE_NOTIFICATIONS_REMOTE_APNS_BUNDLE_ID:com.veilwallet.app}
          privateKeyPem: ${APP_SAFE_NOTIFICATIONS_REMOTE_APNS_PRIVATE_KEY_PEM:}
          useSandbox: ${APP_SAFE_NOTIFICATIONS_REMOTE_APNS_USE_SANDBOX:true}
  auth:
    enabled: ${AUTH_ENABLED:true}
    oneTimeCodeTtlSeconds: ${AUTH_ONE_TIME_CODE_TTL_SECONDS:60}
    oauthStateTtlSeconds: ${AUTH_OAUTH_STATE_TTL_SECONDS:600}
    web3authJwtTtlSeconds: ${AUTH_WEB3AUTH_JWT_TTL_SECONDS:300}
    accessTokenTtlSeconds: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:900}
    refreshTokenTtlSeconds: ${AUTH_REFRESH_TOKEN_TTL_SECONDS:2592000}
    siweNonceTtlSeconds: ${AUTH_SIWE_NONCE_TTL_SECONDS:600}
    siweStatement: ${AUTH_SIWE_STATEMENT:VeilWallet wants you to sign in.}
    socialEnabled: ${AUTH_SOCIAL_ENABLED:false}
    xEnabled: ${AUTH_X_ENABLED:true}
    tgEnabled: ${AUTH_TG_ENABLED:true}
    appleEnabled: ${AUTH_APPLE_ENABLED:true}
    syncEnabled: ${AUTH_SYNC_ENABLED:true}
    bindEnabled: ${AUTH_BIND_ENABLED:true}
    metricsEnabled: ${AUTH_METRICS_ENABLED:true}
    appRedirectAllowlist: ${AUTH_APP_REDIRECT_ALLOWLIST:}
    publicBaseUrl: ${AUTH_PUBLIC_BASE_URL:}
    web3auth:
      # Optional: Web3Auth dashboard clientId/clientSecret.
      # Not required for the current JWT verifier flow, but kept server-side for future use.
      clientId: ${AUTH_WEB3AUTH_CLIENT_ID:}
      clientSecret: ${AUTH_WEB3AUTH_CLIENT_SECRET:}
      issuer: ${AUTH_WEB3AUTH_ISSUER:https://auth.status-mvp.local}
      audience: ${AUTH_WEB3AUTH_AUDIENCE:status-mvp}
      keyId: ${AUTH_WEB3AUTH_KEY_ID:status-mvp-auth-v1}
      privateKeyPem: ${AUTH_WEB3AUTH_PRIVATE_KEY_PEM:}
    appJwt:
      issuer: ${AUTH_APP_JWT_ISSUER:status-mvp-price-backend}
      audience: ${AUTH_APP_JWT_AUDIENCE:status-mvp-app}
      secret: ${AUTH_APP_JWT_SECRET:}
    integrity:
      iosDeviceProofEnabled: ${AUTH_IOS_DEVICE_PROOF_ENABLED:true}
      androidDeviceProofEnabled: ${AUTH_ANDROID_DEVICE_PROOF_ENABLED:true}
      androidPlayIntegrityEnabled: ${AUTH_ANDROID_PLAY_INTEGRITY_ENABLED:true}
      androidProtectedAuthAllowedChannels: ${AUTH_ANDROID_PROTECTED_AUTH_ALLOWED_CHANNELS:play}
      deviceProofChallengeTtlSeconds: ${AUTH_DEVICE_PROOF_CHALLENGE_TTL_SECONDS:60}
      androidPlayIntegrityFreshnessSeconds: ${AUTH_ANDROID_PLAY_INTEGRITY_FRESHNESS_SECONDS:180}
      androidPlayIntegrityPackageName: ${AUTH_ANDROID_PLAY_INTEGRITY_PACKAGE_NAME:com.statusmvp}
      androidPlayIntegrityServiceAccountEmail: ${AUTH_ANDROID_PLAY_INTEGRITY_SERVICE_ACCOUNT_EMAIL:}
      androidPlayIntegrityServiceAccountPrivateKeyPem: ${AUTH_ANDROID_PLAY_INTEGRITY_SERVICE_ACCOUNT_PRIVATE_KEY_PEM:}
      iosAppAttestEnabled: ${AUTH_IOS_APP_ATTEST_ENABLED:true}
      appAttestChallengeTtlSeconds: ${AUTH_APP_ATTEST_CHALLENGE_TTL_SECONDS:60}
      appAttestAssertionChallengeTtlSeconds: ${AUTH_APP_ATTEST_ASSERTION_CHALLENGE_TTL_SECONDS:60}
      iosAllowedApplicationIdentifiers: ${AUTH_IOS_ALLOWED_APPLICATION_IDENTIFIERS:4592CM9497.com.veilwallet.app}
    x:
      clientId: ${AUTH_X_CLIENT_ID:}
      clientSecret: ${AUTH_X_CLIENT_SECRET:}
      redirectUri: ${AUTH_X_REDIRECT_URI:}
      stateSecret: ${AUTH_X_STATE_SECRET:}
      # Minimal scopes for wallet login. We only need `users.read` to call /2/users/me.
      # Keep this minimal: requesting unsupported scopes can cause `invalid_scope` during authorization.
      scopes: ${AUTH_X_SCOPES:users.read}
      authorizeEndpoint: ${AUTH_X_AUTHORIZE_ENDPOINT:https://twitter.com/i/oauth2/authorize}
      tokenEndpoint: ${AUTH_X_TOKEN_ENDPOINT:https://api.twitter.com/2/oauth2/token}
      userinfoEndpoint: ${AUTH_X_USERINFO_ENDPOINT:https://api.twitter.com/2/users/me}
    tg:
      clientId: ${AUTH_TG_CLIENT_ID:}
      clientSecret: ${AUTH_TG_CLIENT_SECRET:}
      redirectUri: ${AUTH_TG_REDIRECT_URI:}
      stateSecret: ${AUTH_TG_STATE_SECRET:}
      scopes: ${AUTH_TG_SCOPES:openid}
      issuer: ${AUTH_TG_ISSUER:https://oauth.telegram.org}
      authorizeEndpoint: ${AUTH_TG_AUTHORIZE_ENDPOINT:https://oauth.telegram.org/auth}
      tokenEndpoint: ${AUTH_TG_TOKEN_ENDPOINT:https://oauth.telegram.org/token}
      jwksUri: ${AUTH_TG_JWKS_URI:https://oauth.telegram.org/.well-known/jwks.json}
      botToken: ${AUTH_TG_BOT_TOKEN:}
      botUsername: ${AUTH_TG_BOT_USERNAME:}
      authMaxAgeSeconds: ${AUTH_TG_AUTH_MAX_AGE_SECONDS:600}
      legacyWidgetEnabled: ${AUTH_TG_LEGACY_WIDGET_ENABLED:false}
    apple:
      audiences: ${AUTH_APPLE_AUDIENCES:com.veilwallet.app}
      issuer: ${AUTH_APPLE_ISSUER:https://appleid.apple.com}
      jwksUri: ${AUTH_APPLE_JWKS_URI:https://appleid.apple.com/auth/keys}
    risk:
      blacklistIps: ${AUTH_RISK_BLACKLIST_IPS:}
      blacklistProviderSubs: ${AUTH_RISK_BLACKLIST_PROVIDER_SUBS:}
      trustedProxyIps: ${AUTH_RISK_TRUSTED_PROXY_IPS:127.0.0.1,::1}
      loginIpLimit: ${AUTH_RISK_LOGIN_IP_LIMIT:20}
      loginDeviceLimit: ${AUTH_RISK_LOGIN_DEVICE_LIMIT:30}
      bindAccountLimit: ${AUTH_RISK_BIND_ACCOUNT_LIMIT:20}
      windowSeconds: ${AUTH_RISK_WINDOW_SECONDS:60}
  bridge:
    across:
      apiBaseUrl: ${BRIDGE_ACROSS_API_BASE_URL:https://app.across.to/api}
      timeoutMs: ${BRIDGE_ACROSS_TIMEOUT_MS:12000}
      chainsCacheTtlSeconds: ${BRIDGE_ACROSS_CHAINS_CACHE_TTL_SECONDS:300}
      routesCacheTtlSeconds: ${BRIDGE_ACROSS_ROUTES_CACHE_TTL_SECONDS:60}
      allowlistMode: ${BRIDGE_ACROSS_ALLOWLIST_MODE:STRICT}
      allowedChainIds: ${BRIDGE_ACROSS_ALLOWED_CHAIN_IDS:1,10,42161,8453,56}
      allowedTokenSymbols: ${BRIDGE_ACROSS_ALLOWED_TOKEN_SYMBOLS:ETH,USDC,USDT,DAI,USDC-BNB,USDT-BNB}
  portfolio:
    ankrBaseUrl: ${ANKR_BASE_URL:https://rpc.ankr.com/multichain}
    ankrApiKey: ${ANKR_API_KEY:}
    timeoutMs: ${PORTFOLIO_TIMEOUT_MS:12000}
    requestTtlSeconds: ${PORTFOLIO_REQUEST_TTL_SECONDS:30}
    defaultChainIds: ${PORTFOLIO_DEFAULT_CHAIN_IDS:1,10,56,8453,42161}
  bsc:
    rpcUrl: ${BSC_RPC_URL:}
  dex:
    pancake:
      routerAddress: ${PANCAKE_ROUTER_V2_ADDRESS:0x10ED43C718714eb63d5aA57B78B54704E256024E}
    veilx:
      address: ${VEILX_CONTRACT_ADDRESS:}
    usdt:
      address: ${BSC_USDT_CONTRACT_ADDRESS:0x55d398326f99059fF775485246999027B3197955}
  coingecko:
    # Additional/override symbol->CoinGecko id mappings.
    # Format: SYMBOL=id,SYMBOL2=id2
    symbolIdOverrides: ${COINGECKO_SYMBOL_ID_OVERRIDES:}
  cors:
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:*}
  legal:
    termsUrl: ${LEGAL_TERMS_URL:}
    privacyUrl: ${LEGAL_PRIVACY_URL:}
    supportUrl: ${LEGAL_SUPPORT_URL:}
    appName: ${LEGAL_APP_NAME:Veil Wallet}
    entityName: ${LEGAL_ENTITY_NAME:VeilLabs}
    contactEmail: ${LEGAL_CONTACT_EMAIL:veillabs.wallet@gmail.com}
    contactAddress: ${LEGAL_CONTACT_ADDRESS:香港九龙区}
    effectiveDate: ${LEGAL_EFFECTIVE_DATE:2026-02-20}
    governingLaw: ${LEGAL_GOVERNING_LAW:Laws of the Hong Kong Special Administrative Region}
    governingLawZh: ${LEGAL_GOVERNING_LAW_ZH:香港特别行政区法律}

logging:
  level:
    root: INFO

management:
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
