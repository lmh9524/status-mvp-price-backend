      inboxLimit: ${SAFE_NOTIFICATIONS_INBOX_LIMIT:50}
      pullDefaultLimit: ${SAFE_NOTIFICATIONS_PULL_DEFAULT_LIMIT:20}
      queueTtlSeconds: ${SAFE_NOTIFICATIONS_QUEUE_TTL_SECONDS:1209600}
      remote:
